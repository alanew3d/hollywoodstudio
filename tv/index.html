<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hollywood Studio AI · TV</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0a;
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.logo {
  font-size: 13px;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  margin-bottom: 32px;
}
.logo span { color: #C4922A; }
h1 {
  font-size: clamp(36px, 8vw, 72px);
  font-weight: 700;
  letter-spacing: -0.03em;
  text-align: center;
  line-height: 1.1;
  margin-bottom: 16px;
}
h1 span { color: #C4922A; }
.sub {
  font-size: 16px;
  color: rgba(255,255,255,0.45);
  text-align: center;
  margin-bottom: 48px;
  line-height: 1.6;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(196,146,42,0.1);
  border: 1px solid rgba(196,146,42,0.3);
  border-radius: 100px;
  padding: 8px 20px;
  font-size: 12px;
  color: #C4922A;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 20px;
}
.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #C4922A;
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
.back {
  margin-top: 48px;
  font-size: 12px;
  color: rgba(255,255,255,0.25);
  text-decoration: none;
  letter-spacing: 0.05em;
  transition: color 0.2s;
}
.back:hover { color: rgba(255,255,255,0.6); }
</style>
</head>
<body>
  <div class="logo">Hollywood Studio <span>AI</span></div>
  <div class="badge"><div class="dot"></div> Em breve</div>
  <h1>Hollywood<br>Studio <span>TV</span></h1>
  <p class="sub">Conteúdo audiovisual gerado com IA.<br>Em construção.</p>
  <a class="back" href="/">← Voltar para o início</a>
</body>
</html>
